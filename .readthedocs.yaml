# Read the Docs configuration for the VanillaPDF Python bindings.
# https://docs.readthedocs.io/en/stable/config-file/v2.html
#
# The docs build the pure-Python API reference via Sphinx autodoc. The native
# `_vanillapdf` C extension is mocked (see docs/conf.py), so this build does NOT
# compile the C++ library / vcpkg stack -- it stays fast and dependency-free.
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.14"

sphinx:
  configuration: docs/conf.py
  # Treat every Sphinx warning as an error so broken cross-references or
  # malformed docstrings fail the build instead of shipping silently.
  fail_on_warning: true

python:
  install:
    - requirements: docs/requirements.txt
