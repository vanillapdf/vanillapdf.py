name: Docs

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "main" ]

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Required for setuptools-scm to derive the version

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt

      # The native _vanillapdf extension is mocked in docs/conf.py, so this
      # builds without compiling the C++ library. -W turns every Sphinx warning
      # (broken cross-references, malformed docstrings, ...) into a failure,
      # matching Read the Docs' fail_on_warning setting.
      - name: Build docs (warnings as errors)
        run: python -m sphinx -b html -W --keep-going docs docs/_build/html
