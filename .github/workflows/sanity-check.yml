name: Sanity Check

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "main" ]

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sanity:
    name: Sanity check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/.vcpkg-cache,readwrite"
    strategy:
      fail-fast: false

      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64

          - os: windows-latest
            arch: AMD64

          - os: macos-15-intel  # Intel
            arch: x86_64

          - os: macos-latest  # Apple Silicon
            arch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Required for setuptools-scm to see Git tags

      - name: Cache vcpkg binaries
        uses: actions/cache@v6
        with:
          path: .vcpkg-cache
          key: vcpkg-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ matrix.arch }}-

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.14"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build pytest setuptools-scm

      - name: Build wheel
        run: python -m build --wheel --outdir dist/

      - name: Install the wheel
        shell: bash
        run: |
          pip install dist/*.whl

      - name: Run test scenarios
        run: |
          pytest tests
