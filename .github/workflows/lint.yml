name: Lint

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "main" ]

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.14"

      # Pure static analysis of the Python layer -- no native build required.
      - name: Install Ruff
        run: python -m pip install ruff

      - name: Ruff check
        run: ruff check .

  pyright:
    name: Pyright (strict)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.14"

      # Strict type check of the Python layer against the committed
      # _vanillapdf.pyi stub -- no native build required.
      - name: Install Pyright
        run: python -m pip install pyright

      - name: Pyright check
        run: pyright
